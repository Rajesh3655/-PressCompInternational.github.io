<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 148" width="960" height="296">
  <rect width="480" height="148" fill="white"/>

  <!-- ════════════ TRIANGLE OUTLINE ════════════ -->
  <polygon
    points="75,9  10,133  140,133"
    fill="white"
    stroke="#1B3A6B"
    stroke-width="8"
    stroke-linejoin="miter"
  />

  <!-- ════════════ LETTER P (italic) ════════════ -->
  <!-- Stem -->
  <rect x="32.5" y="60" width="9" height="54" fill="#1B3A6B" transform="skewX(-8)"/>
  <!-- Bowl filled -->
  <path d="M 34 60 L 61 60 Q 78 60 78 77 Q 78 93 61 93 L 34 93 Z"
        fill="#1B3A6B"
        transform="skewX(-8)"/>
  <!-- Bowl cutout (white counter) -->
  <path d="M 42 68 L 59 68 Q 69 68 69 77 Q 69 86 59 86 L 42 86 Z"
        fill="white"
        transform="skewX(-8)"/>

  <!-- ════════════ LETTER C (open arc) ════════════ -->
  <!-- Outer arc -->
  <path d="
    M 112 64
    A 24 26 0 1 0 112 112
    L 112 104
    A 15 17 0 1 1 112 72
    Z"
    fill="#1B3A6B"
  />

  <!-- ════════════ TEXT RIGHT ════════════ -->
  <!-- PRESS COMP -->
  <text
    x="158"
    y="84"
    font-family="'Arial Black', 'Arial Bold', Arial, sans-serif"
    font-weight="900"
    font-style="normal"
    font-size="40"
    fill="#1B3A6B"
    letter-spacing="0.5"
    xml:space="preserve"
  >PRESS COMP</text>

  <!-- INTERNATIONAL PVT. LTD. -->
  <text
    x="159"
    y="110"
    font-family="Arial, sans-serif"
    font-weight="600"
    font-size="15"
    fill="#1B3A6B"
    letter-spacing="1.6"
    xml:space="preserve"
  >INTERNATIONAL PVT. LTD.</text>

</svg>
